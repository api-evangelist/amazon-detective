naftiko: 1.0.0-alpha2
info:
  label: Amazon Detective — Tags
  description: 'Amazon Detective — Tags. 3 operations. Lead operation: Amazon Detective List Tags for Resource. Self-contained
    Naftiko capability covering one Amazon Detective business surface.'
  tags:
  - Amazon Detective
  - Tags
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_DETECTIVE_API_KEY: AMAZON_DETECTIVE_API_KEY
capability:
  consumes:
  - type: http
    namespace: amazon-detective-tags
    baseUri: https://api.detective.{region}.amazonaws.com
    description: Amazon Detective — Tags business capability. Self-contained, no shared references.
    resources:
    - name: tags-resourceArn
      path: /tags/{resourceArn}
      operations:
      - name: listtagsforresource
        method: GET
        description: Amazon Detective List Tags for Resource
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: resourceArn
          in: path
          type: string
          description: The ARN of the behavior graph for which you want to list tag values.
          required: true
      - name: tagresource
        method: POST
        description: Amazon Detective Tag Resource
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: resourceArn
          in: path
          type: string
          description: The ARN of the behavior graph to assign the tags to.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: untagresource
        method: DELETE
        description: Amazon Detective Untag Resource
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: resourceArn
          in: path
          type: string
          description: The ARN of the behavior graph to remove the tags from.
          required: true
        - name: tagKeys
          in: query
          type: array
          description: The tag keys of the tags to remove from the behavior graph.
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.AMAZON_DETECTIVE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: amazon-detective-tags-rest
    port: 8080
    description: REST adapter for Amazon Detective — Tags. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/tags/{resourcearn}
      name: tags-resourcearn
      description: REST surface for tags-resourceArn.
      operations:
      - method: GET
        name: listtagsforresource
        description: Amazon Detective List Tags for Resource
        call: amazon-detective-tags.listtagsforresource
        with:
          resourceArn: rest.resourceArn
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: tagresource
        description: Amazon Detective Tag Resource
        call: amazon-detective-tags.tagresource
        with:
          resourceArn: rest.resourceArn
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: untagresource
        description: Amazon Detective Untag Resource
        call: amazon-detective-tags.untagresource
        with:
          resourceArn: rest.resourceArn
          tagKeys: rest.tagKeys
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: amazon-detective-tags-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Detective — Tags. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: amazon-detective-list-tags-resource
      description: Amazon Detective List Tags for Resource
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: amazon-detective-tags.listtagsforresource
      with:
        resourceArn: tools.resourceArn
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-detective-tag-resource
      description: Amazon Detective Tag Resource
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: amazon-detective-tags.tagresource
      with:
        resourceArn: tools.resourceArn
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-detective-untag-resource
      description: Amazon Detective Untag Resource
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: amazon-detective-tags.untagresource
      with:
        resourceArn: tools.resourceArn
        tagKeys: tools.tagKeys
      outputParameters:
      - type: object
        mapping: $.
