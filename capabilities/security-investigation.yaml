naftiko: 1.0.0-alpha2
info:
  label: Amazon Detective Security Investigation
  description: Workflow capability for SOC analysts and security engineers to conduct end-to-end security investigations using
    Amazon Detective. Combines behavior graph management, member account administration, investigation lifecycle management,
    and indicator analysis into a unified workflow for threat hunting and security forensics.
  tags:
  - Amazon Detective
  - Security Investigation
  - Forensics
  - Threat Hunting
  - SOC
  - AWS
  created: '2026-04-19'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
    AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
    AWS_SESSION_TOKEN: AWS_SESSION_TOKEN
    AWS_REGION: AWS_REGION
capability:
  consumes:
  - type: http
    namespace: detective
    baseUri: https://api.detective.us-east-1.amazonaws.com
    description: Amazon Detective REST API for security investigation and behavior graph management.
    authentication:
      type: apikey
      key: Authorization
      value: '{{AWS_ACCESS_KEY_ID}}'
      placement: header
    resources:
    - name: graph
      path: /graph
      description: Behavior graph management
      operations:
      - name: create-graph
        method: POST
        description: Creates a new behavior graph for the calling account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: graphs-list
      path: /graphs/list
      description: List behavior graphs
      operations:
      - name: list-graphs
        method: POST
        description: Returns the list of behavior graphs the calling account administers
        inputParameters:
        - name: NextToken
          in: body
          type: string
          required: false
          description: Pagination token
        - name: MaxResults
          in: body
          type: integer
          required: false
          description: Maximum number of results
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: members
      path: /graph/members
      description: Member account management
      operations:
      - name: create-members
        method: POST
        description: Sends invitations to AWS accounts to become member accounts
        inputParameters:
        - name: GraphArn
          in: body
          type: string
          required: true
          description: ARN of the behavior graph
        - name: Accounts
          in: body
          type: array
          required: true
          description: List of AWS accounts to invite
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: members-removal
      path: /graph/members/removal
      description: Remove member accounts
      operations:
      - name: delete-members
        method: POST
        description: Removes the specified member accounts from the behavior graph
        inputParameters:
        - name: GraphArn
          in: body
          type: string
          required: true
          description: ARN of the behavior graph
        - name: AccountIds
          in: body
          type: array
          required: true
          description: List of account IDs to remove
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: members-get
      path: /graph/members/get
      description: Get member details
      operations:
      - name: get-members
        method: POST
        description: Returns membership details for specified member accounts
        inputParameters:
        - name: GraphArn
          in: body
          type: string
          required: true
          description: ARN of the behavior graph
        - name: AccountIds
          in: body
          type: array
          required: true
          description: List of account IDs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: members-list
      path: /graph/members/list
      description: List member accounts
      operations:
      - name: list-members
        method: POST
        description: Retrieves the list of member accounts for a behavior graph
        inputParameters:
        - name: GraphArn
          in: body
          type: string
          required: true
          description: ARN of the behavior graph
        - name: MaxResults
          in: body
          type: integer
          required: false
          description: Maximum number of results
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: monitoring-enable
      path: /graph/members/monitoringEnable
      description: Start monitoring a member account
      operations:
      - name: start-monitoring-member
        method: POST
        description: Starts monitoring a member account with ACCEPTED_BUT_DISABLED status
        inputParameters:
        - name: GraphArn
          in: body
          type: string
          required: true
          description: ARN of the behavior graph
        - name: AccountId
          in: body
          type: string
          required: true
          description: Account ID of the member to enable
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: invitation
      path: /invitation
      description: Manage behavior graph invitations
      operations:
      - name: accept-invitation
        method: PUT
        description: Accepts an invitation to contribute data to a behavior graph
        inputParameters:
        - name: GraphArn
          in: body
          type: string
          required: true
          description: ARN of the behavior graph
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: invitation-removal
      path: /invitation/removal
      description: Reject a behavior graph invitation
      operations:
      - name: reject-invitation
        method: PUT
        description: Rejects an invitation to contribute data to a behavior graph
        inputParameters:
        - name: GraphArn
          in: body
          type: string
          required: true
          description: ARN of the behavior graph
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: invitations-list
      path: /invitations/list
      description: List invitations
      operations:
      - name: list-invitations
        method: POST
        description: Lists open and accepted behavior graph invitations for the member account
        inputParameters:
        - name: MaxResults
          in: body
          type: integer
          required: false
          description: Maximum number of results
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: membership-removal
      path: /membership/removal
      description: Leave a behavior graph
      operations:
      - name: disassociate-membership
        method: POST
        description: Removes the member account from the specified behavior graph
        inputParameters:
        - name: GraphArn
          in: body
          type: string
          required: true
          description: ARN of the behavior graph to leave
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: datasources-list
      path: /graph/datasources/list
      description: List datasource packages
      operations:
      - name: list-datasource-packages
        method: POST
        description: Lists data source packages in the behavior graph
        inputParameters:
        - name: GraphArn
          in: body
          type: string
          required: true
          description: ARN of the behavior graph
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: datasources-get
      path: /graph/datasources/get
      description: Get datasource details for behavior graph members
      operations:
      - name: batch-get-graph-member-datasources
        method: POST
        description: Gets data source package information for behavior graph members
        inputParameters:
        - name: GraphArn
          in: body
          type: string
          required: true
          description: ARN of the behavior graph
        - name: AccountIds
          in: body
          type: array
          required: true
          description: List of account IDs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: membership-datasources
      path: /membership/datasources/get
      description: Get membership datasource history
      operations:
      - name: batch-get-membership-datasources
        method: POST
        description: Gets data source package history for an account
        inputParameters:
        - name: GraphArns
          in: body
          type: array
          required: true
          description: List of behavior graph ARNs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: datasources-update
      path: /graph/datasources/update
      description: Update datasource packages
      operations:
      - name: update-datasource-packages
        method: POST
        description: Starts a data source packages for the specified behavior graph
        inputParameters:
        - name: GraphArn
          in: body
          type: string
          required: true
          description: ARN of the behavior graph
        - name: DatasourcePackages
          in: body
          type: array
          required: true
          description: Datasource packages to enable
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: start-investigation
      path: /investigations/startInvestigation
      description: Start a security investigation
      operations:
      - name: start-investigation
        method: POST
        description: Initiates a Detective investigation on an entity
        inputParameters:
        - name: GraphArn
          in: body
          type: string
          required: true
          description: ARN of the behavior graph
        - name: EntityArn
          in: body
          type: string
          required: true
          description: ARN of the IAM user or role to investigate
        - name: ScopeStartTime
          in: body
          type: string
          required: true
          description: Investigation scope start time
        - name: ScopeEndTime
          in: body
          type: string
          required: true
          description: Investigation scope end time
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: get-investigation
      path: /investigations/getInvestigation
      description: Get investigation results
      operations:
      - name: get-investigation
        method: POST
        description: Returns the investigation results of an investigation for a behavior graph
        inputParameters:
        - name: GraphArn
          in: body
          type: string
          required: true
          description: ARN of the behavior graph
        - name: InvestigationId
          in: body
          type: string
          required: true
          description: The investigation ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: list-investigations
      path: /investigations/listInvestigations
      description: List investigations
      operations:
      - name: list-investigations
        method: POST
        description: Lists investigations for a behavior graph
        inputParameters:
        - name: GraphArn
          in: body
          type: string
          required: true
          description: ARN of the behavior graph
        - name: MaxResults
          in: body
          type: integer
          required: false
          description: Maximum number of results
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: update-investigation-state
      path: /investigations/updateInvestigationState
      description: Update investigation state
      operations:
      - name: update-investigation-state
        method: POST
        description: Updates the state of an investigation
        inputParameters:
        - name: GraphArn
          in: body
          type: string
          required: true
          description: ARN of the behavior graph
        - name: InvestigationId
          in: body
          type: string
          required: true
          description: The investigation ID
        - name: State
          in: body
          type: string
          required: true
          description: New state (ACTIVE or ARCHIVED)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: list-indicators
      path: /investigations/listIndicators
      description: List investigation indicators
      operations:
      - name: list-indicators
        method: POST
        description: Gets the indicators of compromise from an investigation
        inputParameters:
        - name: GraphArn
          in: body
          type: string
          required: true
          description: ARN of the behavior graph
        - name: InvestigationId
          in: body
          type: string
          required: true
          description: The investigation ID
        - name: IndicatorType
          in: body
          type: string
          required: false
          description: Filter by indicator type
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: org-enable-admin
      path: /orgs/enableAdminAccount
      description: Enable organization admin account
      operations:
      - name: enable-organization-admin-account
        method: POST
        description: Designates the Detective administrator account for the organization
        inputParameters:
        - name: AccountId
          in: body
          type: string
          required: true
          description: AWS account to designate as Detective admin
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: org-disable-admin
      path: /orgs/disableAdminAccount
      description: Disable organization admin account
      operations:
      - name: disable-organization-admin-account
        method: POST
        description: Removes the Detective administrator account in the current Region
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: org-describe-config
      path: /orgs/describeOrganizationConfiguration
      description: Describe organization configuration
      operations:
      - name: describe-organization-configuration
        method: POST
        description: Returns information about the configuration for the organization behavior graph
        inputParameters:
        - name: GraphArn
          in: body
          type: string
          required: true
          description: ARN of the organization behavior graph
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: org-update-config
      path: /orgs/updateOrganizationConfiguration
      description: Update organization configuration
      operations:
      - name: update-organization-configuration
        method: POST
        description: Updates the configuration for the organization behavior graph
        inputParameters:
        - name: GraphArn
          in: body
          type: string
          required: true
          description: ARN of the organization behavior graph
        - name: AutoEnable
          in: body
          type: boolean
          required: false
          description: Whether to auto-enable new org accounts as members
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: org-list-admins
      path: /orgs/listAdminAccounts
      description: List organization admin accounts
      operations:
      - name: list-organization-admin-accounts
        method: POST
        description: Lists the Detective administrator accounts in the organization
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: tags
      path: /tags/{resourceArn}
      description: Resource tagging
      operations:
      - name: list-tags-for-resource
        method: GET
        description: Returns the tag values assigned to a behavior graph
        inputParameters:
        - name: resourceArn
          in: path
          type: string
          required: true
          description: ARN of the behavior graph
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: tag-resource
        method: POST
        description: Applies tag values to a behavior graph
        inputParameters:
        - name: resourceArn
          in: path
          type: string
          required: true
          description: ARN of the behavior graph
        - name: Tags
          in: body
          type: object
          required: true
          description: Tags to apply
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: untag-resource
        method: DELETE
        description: Removes tags from a behavior graph
        inputParameters:
        - name: resourceArn
          in: path
          type: string
          required: true
          description: ARN of the behavior graph
        - name: tagKeys
          in: query
          type: array
          required: true
          description: Tag keys to remove
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: security-investigation-api
    description: Unified REST API for Amazon Detective security investigation workflows.
    resources:
    - path: /v1/graphs
      name: graphs
      description: Behavior graph management for security investigation
      operations:
      - method: GET
        name: list-graphs
        description: List all behavior graphs
        call: detective.list-graphs
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-graph
        description: Create a new behavior graph
        call: detective.create-graph
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/graphs/{graphArn}/members
      name: members
      description: Member account management for the behavior graph
      operations:
      - method: GET
        name: list-members
        description: List member accounts contributing to the behavior graph
        call: detective.list-members
        with:
          GraphArn: rest.graphArn
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-members
        description: Invite AWS accounts to become member accounts
        call: detective.create-members
        with:
          GraphArn: rest.graphArn
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: delete-members
        description: Remove member accounts from the behavior graph
        call: detective.delete-members
        with:
          GraphArn: rest.graphArn
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/investigations
      name: investigations
      description: Security investigation lifecycle management
      operations:
      - method: GET
        name: list-investigations
        description: List all investigations in a behavior graph
        call: detective.list-investigations
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: start-investigation
        description: Start a new investigation on an IAM user or role
        call: detective.start-investigation
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/investigations/{investigationId}
      name: investigation
      description: Individual investigation management
      operations:
      - method: GET
        name: get-investigation
        description: Get results and status of an investigation
        call: detective.get-investigation
        with:
          InvestigationId: rest.investigationId
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: update-investigation-state
        description: Archive or reactivate an investigation
        call: detective.update-investigation-state
        with:
          InvestigationId: rest.investigationId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/investigations/{investigationId}/indicators
      name: indicators
      description: Indicators of compromise from an investigation
      operations:
      - method: GET
        name: list-indicators
        description: Get indicators of compromise from an investigation
        call: detective.list-indicators
        with:
          InvestigationId: rest.investigationId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/datasources
      name: datasources
      description: Data source package management
      operations:
      - method: GET
        name: list-datasource-packages
        description: List data source packages in the behavior graph
        call: detective.list-datasource-packages
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: security-investigation-mcp
    transport: http
    description: MCP server for AI-assisted security investigation and threat hunting with Amazon Detective.
    tools:
    - name: list-graphs
      description: List all Amazon Detective behavior graphs
      hints:
        readOnly: true
        openWorld: true
      call: detective.list-graphs
      outputParameters:
      - type: object
        mapping: $.
    - name: create-graph
      description: Create a new Amazon Detective behavior graph to begin security monitoring
      hints:
        readOnly: false
        destructive: false
      call: detective.create-graph
      outputParameters:
      - type: object
        mapping: $.
    - name: list-members
      description: List member accounts contributing data to a behavior graph
      hints:
        readOnly: true
        openWorld: true
      call: detective.list-members
      outputParameters:
      - type: object
        mapping: $.
    - name: get-members
      description: Get detailed membership information for specific accounts
      hints:
        readOnly: true
        openWorld: false
      call: detective.get-members
      outputParameters:
      - type: object
        mapping: $.
    - name: create-members
      description: Invite AWS accounts to contribute data to a behavior graph
      hints:
        readOnly: false
        destructive: false
      call: detective.create-members
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-members
      description: Remove member accounts from a behavior graph
      hints:
        readOnly: false
        destructive: true
      call: detective.delete-members
      outputParameters:
      - type: object
        mapping: $.
    - name: start-investigation
      description: Initiate a Detective investigation on a suspicious IAM user or role
      hints:
        readOnly: false
        destructive: false
      call: detective.start-investigation
      outputParameters:
      - type: object
        mapping: $.
    - name: get-investigation
      description: Get the results, severity, and status of a security investigation
      hints:
        readOnly: true
        openWorld: false
      call: detective.get-investigation
      outputParameters:
      - type: object
        mapping: $.
    - name: list-investigations
      description: List all security investigations with filtering by severity, status, and state
      hints:
        readOnly: true
        openWorld: true
      call: detective.list-investigations
      outputParameters:
      - type: object
        mapping: $.
    - name: update-investigation-state
      description: Archive a completed investigation or reactivate an archived one
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: detective.update-investigation-state
      outputParameters:
      - type: object
        mapping: $.
    - name: list-indicators
      description: Get indicators of compromise (TTPs, flagged IPs, impossible travel) from an investigation
      hints:
        readOnly: true
        openWorld: true
      call: detective.list-indicators
      outputParameters:
      - type: object
        mapping: $.
    - name: list-datasource-packages
      description: List data source packages and their ingest status in a behavior graph
      hints:
        readOnly: true
        openWorld: true
      call: detective.list-datasource-packages
      outputParameters:
      - type: object
        mapping: $.
    - name: update-datasource-packages
      description: Enable additional data source packages like EKS audit logs or AD audit logs
      hints:
        readOnly: false
        destructive: false
      call: detective.update-datasource-packages
      outputParameters:
      - type: object
        mapping: $.
    - name: describe-organization-configuration
      description: Get the organization behavior graph configuration including auto-enable settings
      hints:
        readOnly: true
        openWorld: false
      call: detective.describe-organization-configuration
      outputParameters:
      - type: object
        mapping: $.
    - name: list-organization-admin-accounts
      description: List Detective administrator accounts in the organization
      hints:
        readOnly: true
        openWorld: true
      call: detective.list-organization-admin-accounts
      outputParameters:
      - type: object
        mapping: $.
