naftiko: 1.0.0-alpha2
info:
  label: Amazon Detective — Graph
  description: 'Amazon Detective — Graph. 3 operations. Lead operation: Amazon Detective Create Graph. Self-contained Naftiko
    capability covering one Amazon Detective business surface.'
  tags:
  - Amazon Detective
  - Graph
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_DETECTIVE_API_KEY: AMAZON_DETECTIVE_API_KEY
capability:
  consumes:
  - type: http
    namespace: amazon-detective-graph
    baseUri: https://api.detective.{region}.amazonaws.com
    description: Amazon Detective — Graph business capability. Self-contained, no shared references.
    resources:
    - name: graph
      path: /graph
      operations:
      - name: creategraph
        method: POST
        description: Amazon Detective Create Graph
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: deletegraph
        method: DELETE
        description: Amazon Detective Delete Graph
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: graphs-list
      path: /graphs/list
      operations:
      - name: listgraphs
        method: POST
        description: Amazon Detective List Graphs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.AMAZON_DETECTIVE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: amazon-detective-graph-rest
    port: 8080
    description: REST adapter for Amazon Detective — Graph. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/graph
      name: graph
      description: REST surface for graph.
      operations:
      - method: POST
        name: creategraph
        description: Amazon Detective Create Graph
        call: amazon-detective-graph.creategraph
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletegraph
        description: Amazon Detective Delete Graph
        call: amazon-detective-graph.deletegraph
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/graphs/list
      name: graphs-list
      description: REST surface for graphs-list.
      operations:
      - method: POST
        name: listgraphs
        description: Amazon Detective List Graphs
        call: amazon-detective-graph.listgraphs
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: amazon-detective-graph-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Detective — Graph. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: amazon-detective-create-graph
      description: Amazon Detective Create Graph
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: amazon-detective-graph.creategraph
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-detective-delete-graph
      description: Amazon Detective Delete Graph
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: amazon-detective-graph.deletegraph
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-detective-list-graphs
      description: Amazon Detective List Graphs
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: amazon-detective-graph.listgraphs
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
