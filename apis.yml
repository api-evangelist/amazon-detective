apis:
  - name: Amazon Detective API
    description: >-
      The Amazon Detective API provides programmatic access to manage security
      investigation workflows. It enables developers to create and manage behavior
      graphs, invite and manage member accounts, start and manage investigations,
      list indicators of compromise, manage data source packages, and configure
      AWS Organizations integration for multi-account security management.
