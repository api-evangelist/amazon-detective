components:
  securitySchemes:
    sigv4:
      type: apiKey
      name: Authorization
      in: header
      description: AWS Signature Version 4 authentication
  schemas:
    ErrorResponse:
      type: object
      description: Standard error response from Amazon Detective
      properties:
        Message:
          type: string
          description: Human-readable error message
          example: The request is invalid.
        Code:
          type: string
          description: Error code
          example: ValidationException
    CreateGraphRequest:
      type: object
      description: Request to create a new behavior graph
      properties:
        Tags:
          type: object
          description: The tags to assign to the new behavior graph
          additionalProperties:
            type: string
    CreateGraphResponse:
      type: object
      description: Response from creating a behavior graph
      properties:
        GraphArn:
          type: string
          description: The ARN of the new behavior graph
          example: arn:aws:detective:us-east-1:123456789012:graph:abc123def456
    DeleteGraphRequest:
      type: object
      required:
        - GraphArn
      description: Request to delete a behavior graph
      properties:
        GraphArn:
          type: string
          description: The ARN of the behavior graph to disable
          example: arn:aws:detective:us-east-1:123456789012:graph:abc123def456
    ListGraphsRequest:
      type: object
      description: Request to list behavior graphs
      properties:
        NextToken:
          type: string
          description: For requests to get the next page of results. The pagination token from the previous request.
          example: abc123token
        MaxResults:
          type: integer
          description: The maximum number of graphs to return at a time.
          example: 100
    ListGraphsResponse:
      type: object
      description: Response from listing behavior graphs
      properties:
        GraphList:
          type: array
          description: A list of behavior graphs that the account is an administrator account of.
          items:
            $ref: '#/components/schemas/Graph'
        NextToken:
          type: string
          description: If there are more behavior graphs remaining in the results, then this is the pagination token to use.
    Graph:
      type: object
      description: A behavior graph in Amazon Detective
      properties:
        Arn:
          type: string
          description: The ARN of the behavior graph.
          example: arn:aws:detective:us-east-1:123456789012:graph:abc123def456
        CreatedTime:
          type: string
          format: date-time
          description: The date and time that the behavior graph was created.
          example: '2025-01-15T10:00:00Z'
    CreateMembersRequest:
      type: object
      required:
        - GraphArn
        - Accounts
      description: Request to invite member accounts to a behavior graph
      properties:
        GraphArn:
          type: string
          description: The ARN of the behavior graph.
          example: arn:aws:detective:us-east-1:123456789012:graph:abc123def456
        Message:
          type: string
          description: Customized message text to include in the invitation email message.
          example: Please join our security behavior graph.
        DisableEmailNotification:
          type: boolean
          description: If set to true, invitation emails are not sent.
          example: false
        Accounts:
          type: array
          description: The list of AWS accounts to invite to become member accounts.
          items:
            $ref: '#/components/schemas/Account'
    CreateMembersResponse:
      type: object
      description: Response from creating member accounts
      properties:
        Members:
          type: array
          description: The set of member account invitation or enablement requests.
          items:
            $ref: '#/components/schemas/MemberDetail'
        UnprocessedAccounts:
          type: array
          description: The list of accounts for which Detective was unable to process the invitation.
          items:
            $ref: '#/components/schemas/UnprocessedAccount'
    DeleteMembersRequest:
      type: object
      required:
        - GraphArn
        - AccountIds
      description: Request to remove member accounts from a behavior graph
      properties:
        GraphArn:
          type: string
          description: The ARN of the behavior graph to remove members from.
          example: arn:aws:detective:us-east-1:123456789012:graph:abc123def456
        AccountIds:
          type: array
          description: The list of AWS account identifiers of the member accounts to remove.
          items:
            type: string
          example:
            - '234567890123'
    DeleteMembersResponse:
      type: object
      description: Response from deleting member accounts
      properties:
        AccountIds:
          type: array
          description: The list of AWS account identifiers of the member accounts that Detective successfully deleted.
          items:
            type: string
        UnprocessedAccounts:
          type: array
          description: The list of member accounts that Detective was unable to delete.
          items:
            $ref: '#/components/schemas/UnprocessedAccount'
    GetMembersRequest:
      type: object
      required:
        - GraphArn
        - AccountIds
      description: Request to get member details
      properties:
        GraphArn:
          type: string
          description: The ARN of the behavior graph to get member details for.
          example: arn:aws:detective:us-east-1:123456789012:graph:abc123def456
        AccountIds:
          type: array
          description: The list of AWS account identifiers of the member accounts to get information on.
          items:
            type: string
          example:
            - '234567890123'
    GetMembersResponse:
      type: object
      description: Response from getting member details
      properties:
        MemberDetails:
          type: array
          description: The member account details that Detective retrieved.
          items:
            $ref: '#/components/schemas/MemberDetail'
        UnprocessedAccounts:
          type: array
          description: The requested member accounts for which Detective was unable to return member details.
          items:
            $ref: '#/components/schemas/UnprocessedAccount'
    ListMembersRequest:
      type: object
      required:
        - GraphArn
      description: Request to list member accounts
      properties:
        GraphArn:
          type: string
          description: The ARN of the behavior graph to list member accounts for.
          example: arn:aws:detective:us-east-1:123456789012:graph:abc123def456
        NextToken:
          type: string
          description: For requests to retrieve the next page of member account results.
          example: abc123token
        MaxResults:
          type: integer
          description: The maximum number of member accounts to include in the response.
          example: 100
    ListMembersResponse:
      type: object
      description: Response from listing member accounts
      properties:
        MemberDetails:
          type: array
          description: The list of member accounts in the behavior graph.
          items:
            $ref: '#/components/schemas/MemberDetail'
        NextToken:
          type: string
          description: If there are more member accounts remaining in the results, then use this pagination token.
    StartMonitoringMemberRequest:
      type: object
      required:
        - GraphArn
        - AccountId
      description: Request to start monitoring a member account
      properties:
        GraphArn:
          type: string
          description: The ARN of the behavior graph.
          example: arn:aws:detective:us-east-1:123456789012:graph:abc123def456
        AccountId:
          type: string
          description: The account ID of the member account to try to enable.
          example: '234567890123'
    AcceptInvitationRequest:
      type: object
      required:
        - GraphArn
      description: Request to accept an invitation to a behavior graph
      properties:
        GraphArn:
          type: string
          description: The ARN of the behavior graph that the member account is accepting the invitation for.
          example: arn:aws:detective:us-east-1:123456789012:graph:abc123def456
    RejectInvitationRequest:
      type: object
      required:
        - GraphArn
      description: Request to reject a behavior graph invitation
      properties:
        GraphArn:
          type: string
          description: The ARN of the behavior graph that the member account is rejecting the invitation for.
          example: arn:aws:detective:us-east-1:123456789012:graph:abc123def456
    ListInvitationsRequest:
      type: object
      description: Request to list invitations
      properties:
        NextToken:
          type: string
          description: The pagination token for the next page of results.
          example: abc123token
        MaxResults:
          type: integer
          description: The maximum number of invitations to return.
          example: 100
    ListInvitationsResponse:
      type: object
      description: Response from listing invitations
      properties:
        Invitations:
          type: array
          description: The list of behavior graphs for which the member account has open or accepted invitations.
          items:
            $ref: '#/components/schemas/MemberDetail'
        NextToken:
          type: string
          description: If there are more invitations remaining in the results, then use this pagination token.
    DisassociateMembershipRequest:
      type: object
      required:
        - GraphArn
      description: Request to disassociate from a behavior graph
      properties:
        GraphArn:
          type: string
          description: The ARN of the behavior graph to remove the member account from.
          example: arn:aws:detective:us-east-1:123456789012:graph:abc123def456
    ListDatasourcePackagesRequest:
      type: object
      required:
        - GraphArn
      description: Request to list datasource packages
      properties:
        GraphArn:
          type: string
          description: The ARN of the behavior graph.
          example: arn:aws:detective:us-east-1:123456789012:graph:abc123def456
        NextToken:
          type: string
          description: For requests to get the next page of results.
          example: abc123token
        MaxResults:
          type: integer
          description: The total number of items to return.
          example: 100
    ListDatasourcePackagesResponse:
      type: object
      description: Response from listing datasource packages
      properties:
        DatasourcePackages:
          type: object
          description: Details on the data source packages active in the behavior graph.
          additionalProperties:
            $ref: '#/components/schemas/DatasourcePackageIngestDetail'
        NextToken:
          type: string
          description: For requests to get the next page of results.
    DatasourcePackageIngestDetail:
      type: object
      description: Details about the ingest state of a datasource package
      properties:
        DatasourcePackageIngestState:
          type: string
          description: Details on which data source packages are ingested for a member account.
          enum:
            - STARTED
            - STOPPED
            - DISABLED
        LastIngestStateChange:
          type: object
          description: The date a data source package type was last updated for a member account.
          additionalProperties:
            $ref: '#/components/schemas/TimestampForCollection'
    TimestampForCollection:
      type: object
      description: Details on when data collection began for a source package.
      properties:
        Timestamp:
          type: string
          format: date-time
          description: The data and time when data collection began for a source package.
          example: '2025-01-15T10:00:00Z'
    BatchGetGraphMemberDatasourcesRequest:
      type: object
      required:
        - GraphArn
