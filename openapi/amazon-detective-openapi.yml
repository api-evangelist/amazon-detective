            - TTP_OBSERVED
            - IMPOSSIBLE_TRAVEL
            - FLAGGED_IP_ADDRESS
            - NEW_GEOLOCATION
            - NEW_ASO
            - NEW_USER_AGENT
            - RELATED_FINDING
            - RELATED_FINDING_GROUP
