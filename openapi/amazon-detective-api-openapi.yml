openapi: 3.1.0
info:
  title: Amazon Detective REST API
  description: >-
    Amazon Detective makes it easy to analyze, investigate, and quickly identify
    the root cause of potential security issues or suspicious activities. This
    API enables management of behavior graphs, member accounts, investigations,
    and data source configurations.
  version: '2018-10-26'
  contact:
    name: AWS Support
    url: https://aws.amazon.com/premiumsupport/
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: https://aws.amazon.com/service-terms/
  x-logo:
    url: https://a0.awsstatic.com/libra-css/images/logos/aws_logo_smile_1200x630.png
externalDocs:
  description: Amazon Detective API Reference
  url: https://docs.aws.amazon.com/detective/latest/APIReference/Welcome.html
servers:
  - url: https://api.detective.{region}.amazonaws.com
    description: Amazon Detective regional endpoint
    variables:
      region:
        default: us-east-1
        description: AWS region
        enum:
          - us-east-1
          - us-east-2
          - us-west-1
          - us-west-2
          - eu-west-1
          - eu-west-2
          - eu-central-1
          - ap-northeast-1
          - ap-southeast-1
          - ap-southeast-2
          - ap-south-1
          - sa-east-1
security:
  - sigv4: []
paths:
  /graph:
    post:
      summary: Amazon Detective Create Graph
      description: Creates a new behavior graph for the calling account and sets it as the administrator account.
      operationId: createGraph
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGraphRequest'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateGraphResponse'
      tags:
        - Graph
  /graphs/list:
    post:
      summary: Amazon Detective List Graphs
      description: Returns the list of behavior graphs that the calling account is an administrator account of.
      operationId: listGraphs
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListGraphsRequest'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListGraphsResponse'
      tags:
        - Graphs
  /graph/members/get:
    post:
      summary: Amazon Detective Get Members
      description: Returns the membership details for specified member accounts of a behavior graph.
      operationId: getMembers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetMembersRequest'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetMembersResponse'
      tags:
        - Graph
  /graph/members:
    post:
      summary: Amazon Detective Create Members
      description: Sends a request to invite the specified AWS accounts to be member accounts in the behavior graph.
      operationId: createMembers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMembersRequest'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateMembersResponse'
      tags:
        - Graph
  /graph/members/list:
    post:
      summary: Amazon Detective List Members
      description: Retrieves the list of member accounts for a behavior graph.
      operationId: listMembers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListMembersRequest'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListMembersResponse'
      tags:
        - Graph
  /investigations/startInvestigation:
    post:
      summary: Amazon Detective Start Investigation
      description: Initiates an investigation on an entity in a behavior graph.
      operationId: startInvestigation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartInvestigationRequest'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StartInvestigationResponse'
      tags:
        - Investigations
  /graph/datasources/get:
    post:
      summary: Amazon Detective List Datasource Packages
      description: Lists data source packages for the behavior graph.
      operationId: listDatasourcePackages
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListDatasourcePackagesRequest'
      responses:
        '200':
          description: Successful response
      tags:
        - Graph
components:
  securitySchemes:
    sigv4:
      type: apiKey
      name: Authorization
      in: header
      description: AWS Signature Version 4
  schemas:
    CreateGraphRequest:
      type: object
      properties:
        Tags:
          type: object
          additionalProperties:
            type: string
    CreateGraphResponse:
      type: object
      properties:
        GraphArn:
          type: string
    ListGraphsRequest:
      type: object
      properties:
        NextToken:
          type: string
        MaxResults:
          type: integer
    ListGraphsResponse:
      type: object
      properties:
        GraphList:
          type: array
          items:
            $ref: '#/components/schemas/Graph'
        NextToken:
          type: string
    Graph:
      type: object
      properties:
        Arn:
          type: string
        CreatedTime:
          type: string
          format: date-time
    GetMembersRequest:
      type: object
      required:
        - GraphArn
        - AccountIds
      properties:
        GraphArn:
          type: string
        AccountIds:
          type: array
          items:
            type: string
    GetMembersResponse:
      type: object
      properties:
        MemberDetails:
          type: array
          items:
            $ref: '#/components/schemas/MemberDetail'
        UnprocessedAccounts:
          type: array
          items:
            $ref: '#/components/schemas/UnprocessedAccount'
    CreateMembersRequest:
      type: object
      required:
        - GraphArn
        - Accounts
      properties:
        GraphArn:
          type: string
        Message:
          type: string
        DisableEmailNotification:
          type: boolean
        Accounts:
          type: array
          items:
            $ref: '#/components/schemas/Account'
    CreateMembersResponse:
      type: object
      properties:
        Members:
          type: array
          items:
            $ref: '#/components/schemas/MemberDetail'
        UnprocessedAccounts:
          type: array
          items:
            $ref: '#/components/schemas/UnprocessedAccount'
    ListMembersRequest:
      type: object
      required:
        - GraphArn
      properties:
        GraphArn:
          type: string
        NextToken:
          type: string
        MaxResults:
          type: integer
    ListMembersResponse:
      type: object
      properties:
        MemberDetails:
          type: array
          items:
            $ref: '#/components/schemas/MemberDetail'
        NextToken:
          type: string
    StartInvestigationRequest:
      type: object
      required:
        - GraphArn
        - EntityArn
        - ScopeStartTime
        - ScopeEndTime
      properties:
        GraphArn:
          type: string
        EntityArn:
          type: string
        ScopeStartTime:
          type: string
          format: date-time
        ScopeEndTime:
          type: string
          format: date-time
    StartInvestigationResponse:
      type: object
      properties:
        InvestigationId:
          type: string
    ListDatasourcePackagesRequest:
      type: object
      required:
        - GraphArn
      properties:
        GraphArn:
          type: string
        NextToken:
          type: string
        MaxResults:
          type: integer
    Account:
      type: object
      required:
        - AccountId
        - EmailAddress
      properties:
        AccountId:
          type: string
        EmailAddress:
          type: string
    MemberDetail:
      type: object
      properties:
        AccountId:
          type: string
        EmailAddress:
          type: string
        GraphArn:
          type: string
        AdministratorId:
          type: string
        Status:
          type: string
          enum: [INVITED, VERIFICATION_IN_PROGRESS, VERIFICATION_FAILED, ENABLED, ACCEPTED_BUT_DISABLED]
        InvitedTime:
          type: string
          format: date-time
        UpdatedTime:
          type: string
          format: date-time
    UnprocessedAccount:
      type: object
      properties:
        AccountId:
          type: string
        Reason:
          type: string
tags:
  - name: Graph
  - name: Graphs
  - name: Investigations
